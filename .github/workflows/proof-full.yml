name: proof-full

on:
  pull_request:
  workflow_dispatch:

jobs:
  proof-full:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Validate root files
        run: cargo run -p secloud-cli -- validate root

      - name: Validate schemas
        run: cargo run -p secloud-cli -- validate schemas

      - name: Validate Relay
        run: cargo run -p secloud-cli -- validate relay

      - name: Validate Seal
        run: cargo run -p secloud-cli -- validate seal

      - name: Validate Skills
        run: cargo run -p secloud-cli -- validate skills

      - name: Validate Capabilities
        run: cargo run -p secloud-cli -- validate capabilities

      - name: Validate Workers
        run: cargo run -p secloud-cli -- validate workers

      - name: Validate Control Registry
        run: cargo run -p secloud-cli -- validate control
