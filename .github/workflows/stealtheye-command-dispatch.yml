name: stealtheye-command-dispatch

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      command:
        description: Closed StealthEye command
        required: false
        default: /stealtheye status

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: read

jobs:
  command-dispatch:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.comment.body, '/stealtheye ')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Emit command receipt
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          INPUT_COMMAND: ${{ inputs.command }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p .stealtheye/command-outbox
          COMMAND="${INPUT_COMMAND:-}"
          if [ -z "$COMMAND" ]; then
            COMMAND="$COMMENT_BODY"
          fi
          case "$COMMAND" in
            "/stealtheye prove-main"*|"/stealtheye run-proof"*|"/stealtheye run-proof-set"*|"/stealtheye start-mission"*|"/stealtheye status"*)
              STATUS="accepted_closed_command"
              ;;
            *)
              STATUS="rejected_unknown_command"
              ;;
          esac
          cat > .stealtheye/command-outbox/latest.json <<JSON
          {
            "schema_version": "CommandResultOutboxV0",
            "event_name": "$EVENT_NAME",
            "status": "$STATUS",
            "latest_command": "$COMMAND",
            "closed_command_set": ["prove-main", "run-proof", "run-proof-set", "start-mission", "status"],
            "result": "CommandResultOutboxV0 receipt only; closed command parser does not execute arbitrary shell.",
            "head_sha": "$HEAD_SHA"
          }
          JSON
          cat .stealtheye/command-outbox/latest.json >> .stealtheye/command-outbox/history.jsonl
      - name: Upload command outbox
        uses: actions/upload-artifact@v4
        with:
          name: s12-command-outbox
          path: .stealtheye/command-outbox/
