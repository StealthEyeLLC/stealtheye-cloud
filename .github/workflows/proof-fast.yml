name: proof-fast

on:
  push:
    branches:
      - main
      - 'build/**'
      - 'repair/**'
  pull_request:
  workflow_dispatch:

jobs:
  proof-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace

      - name: Validate root files
        run: cargo run -p secloud-cli -- validate root

      - name: Validate schemas
        run: cargo run -p secloud-cli -- validate schemas

      - name: Validate Relay
        run: cargo run -p secloud-cli -- validate relay

      - name: Validate Seal
        run: cargo run -p secloud-cli -- validate seal

      - name: Validate Active
        run: cargo run -p secloud-cli -- validate active

      - name: Validate Decisions
        run: cargo run -p secloud-cli -- validate decisions

      - name: Validate Skills
        run: cargo run -p secloud-cli -- validate skills

      - name: Validate Capabilities
        run: cargo run -p secloud-cli -- validate capabilities

      - name: Validate Workers
        run: cargo run -p secloud-cli -- validate workers

      - name: Validate Control Registry
        run: cargo run -p secloud-cli -- validate control

      - name: Validate Learning
        run: cargo run -p secloud-cli -- validate learning

      - name: Validate Search
        run: cargo run -p secloud-cli -- validate search

      - name: Validate Hypothesis
        run: cargo run -p secloud-cli -- validate hypothesis

      - name: Validate Proof Viewer
        run: cargo run -p secloud-cli -- validate proof-viewer

      - name: Doctor
        run: cargo run -p secloud-cli -- doctor
